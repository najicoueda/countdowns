<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>創立100周年カウントダウン</title>
<style>
  /* ===== 設定はここだけ変更すればOK =====
     目標日時 = 2029年7月18日 0時0分0秒（日本時間 JST/+09:00） */
  :root{
    --bg1:#3fa9a0;   /* 背景グラデーション 左上 */
    --bg2:#7fc9a6;   /* 背景グラデーション 右下 */
    --panel:rgba(255,255,255,0.18); /* 数字パネルの色 */
    --num:#ffffff;   /* 数字の色 */
    --label:rgba(255,255,255,0.7);  /* ラベルの色 */
    --title:rgba(255,255,255,0.92);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2));
    display:flex;align-items:center;justify-content:center;
    min-height:auto;overflow:hidden;
  }
  .wrap{width:100%;max-width:480px;padding:10px 8px;text-align:center;}
  .title{
    color:var(--title);font-weight:300;letter-spacing:.06em;
    font-size:clamp(12px,2.6vw,18px);margin-bottom:clamp(8px,1.6vw,14px);
  }
  .title strong{font-weight:700;}
  .clock{
    display:flex;justify-content:center;align-items:stretch;
    gap:clamp(5px,1.4vw,10px);
  }
  .unit{flex:1 1 0;max-width:100px;}
  .panel{
    position:relative;background:var(--panel);
    border-radius:8px;padding:clamp(5px,1.4vw,12px) 2px;
    box-shadow:0 4px 12px rgba(0,0,0,.12);overflow:hidden;
  }
  /* 中央の横ライン（フリップ時計風） */
  .panel::after{
    content:"";position:absolute;left:0;right:0;top:50%;height:2px;
    background:rgba(0,0,0,.18);transform:translateY(-1px);
  }
  .digits{
    color:var(--num);font-weight:700;line-height:1;
    font-size:clamp(20px,5vw,38px);
    font-variant-numeric:tabular-nums;
    letter-spacing:-.02em;white-space:nowrap;
    transition:transform .25s ease;
  }
  .flip .digits{animation:flip .4s ease;}
  @keyframes flip{
    0%{transform:perspective(200px) rotateX(0deg);}
    50%{transform:perspective(200px) rotateX(-18deg);opacity:.7;}
    100%{transform:perspective(200px) rotateX(0deg);opacity:1;}
  }
  .label{
    margin-top:clamp(4px,1vw,8px);color:var(--label);
    font-size:clamp(9px,1.9vw,12px);letter-spacing:.04em;
  }
  .done{
    color:#fff;font-size:clamp(22px,6vw,40px);font-weight:700;
    line-height:1.4;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="title">創立<strong>100</strong>周年まで &nbsp;Countdown</div>
    <div class="clock" id="clock">
      <div class="unit"><div class="panel"><div class="digits" id="d">--</div></div><div class="label">Days</div></div>
      <div class="unit"><div class="panel"><div class="digits" id="h">--</div></div><div class="label">Hours</div></div>
      <div class="unit"><div class="panel"><div class="digits" id="m">--</div></div><div class="label">Minutes</div></div>
      <div class="unit"><div class="panel"><div class="digits" id="s">--</div></div><div class="label">Seconds</div></div>
    </div>
  </div>

<script>
  // 目標日時（日本時間 2029-07-18 00:00:00）
  var TARGET = new Date("2029-07-18T00:00:00+09:00").getTime();

  var el = { d:document.getElementById('d'), h:document.getElementById('h'),
             m:document.getElementById('m'), s:document.getElementById('s') };
  var prev = {};

  function pad(n,len){ n=String(n); while(n.length<len) n='0'+n; return n; }

  function set(node,key,val){
    if(prev[key]===val) return;
    prev[key]=val;
    node.textContent=val;
    var p=node.parentElement;          // .panel
    p.classList.remove('flip'); void p.offsetWidth; p.classList.add('flip');
  }

  function tick(){
    var diff = TARGET - Date.now();
    if(diff<=0){
      document.getElementById('clock').innerHTML =
        '<div class="done">🎉 創立100周年<br>2029.7.18</div>';
      clearInterval(timer);
      return;
    }
    var sec = Math.floor(diff/1000);
    var days = Math.floor(sec/86400);
    var hours = Math.floor((sec%86400)/3600);
    var mins = Math.floor((sec%3600)/60);
    var secs = sec%60;
    set(el.d,'d',pad(days,2));
    set(el.h,'h',pad(hours,2));
    set(el.m,'m',pad(mins,2));
    set(el.s,'s',pad(secs,2));
  }

  tick();
  var timer = setInterval(tick,1000);
</script>
</body>
</html>
